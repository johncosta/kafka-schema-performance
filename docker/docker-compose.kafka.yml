# Apache Kafka in KRaft mode (no ZooKeeper), single combined broker+controller.
# Host clients use 127.0.0.1:19092 (mapped to broker listener 9092 inside the container).
#
#   docker compose -f docker/docker-compose.kafka.yml up -d
#   export KSP_KAFKA_BOOTSTRAP=127.0.0.1:19092
#   pytest tests/integration -m kafka -v
#
# CLUSTER_ID is fixed for ephemeral test nodes (fresh container filesystem each run).
services:
  kafka:
    image: apache/kafka:3.8.1
    hostname: kafka
    container_name: ksp-kafka-kraft
    ports:
      - "19092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
